<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>M3U8 Crawler Pro</title>
    <link rel="stylesheet" href="/assets/css/client.css">
    <script src="/assets/js/client.js" defer></script>
</head>
<body>
    <main class="app-shell">
        <header class="app-header">
            <div class="brand">
                <img class="brand-mark" src="/assets/img/brand-mark.png" width="44">
                <span class="brand-copy">
                    <span class="brand-title">M3U8 Crawler</span>
                    <span class="brand-subtitle">Xuất danh sách kênh từ nguồn trận đấu</span>
                </span>
            </div>
            <div id="status" class="status-pill">Sẵn sàng</div>
        </header>

        <section class="workspace">
            <form id="crawlForm" class="tool-panel">
                <div class="field">
                    <label for="sourceUrl">Link nguồn</label>
                    <textarea id="sourceUrl" name="sourceUrl" rows="5" required>https://hoadaotv.info/</textarea>
                </div>

                <div class="control-grid">
                    <div class="field">
                        <span class="field-label">Định dạng file</span>
                        <div class="segmented-control">
                            <label class="segment"><input type="radio" name="format" value="json" checked><span>JSON</span></label>
                            <label class="segment"><input type="radio" name="format" value="txt"><span>TXT</span></label>
                        </div>
                    </div>
                    <div class="field field-small">
                        <label for="maxMatches">Số trận</label>
                        <input id="maxMatches" type="number" value="80">
                    </div>
                </div>

                <div class="actions">
                    <button id="exportButton" class="button button-primary" type="submit">
                        <span id="buttonSpinner" class="spinner hidden"></span>
                        <span id="buttonIcon">🚀</span> <span>Lấy link</span>
                    </button>
                    <button id="txtPrintButton" class="button button-secondary" type="button" title="Chuyển sang TXT" disabled>📄</button>
                    <button id="clearButton" class="button button-icon-only" type="button">🗑️</button>
                </div>

                <dl class="file-meta">
                    <div class="meta-row"><dt>File</dt><dd id="fileName">-</dd></div>
                    <div class="meta-row"><dt>Dung lượng</dt><dd id="fileSize">-</dd></div>
                    <div class="meta-row"><dt>Thời gian</dt><dd id="createdAt">-</dd></div>
                    <div class="meta-row"><dt>Link</dt><dd>
                        <a id="storageLink" class="meta-link hidden" target="_blank">Mở link</a>
                        <span id="storageEmpty">-</span>
                    </dd></div>
                </dl>
            </form>

            <section class="preview-panel">
                <div class="preview-head">
                    <div class="preview-title">Xem trước</div>
                    <button id="copyButton" class="button" disabled>Copy</button>
                    <button id="downloadButton" class="button" disabled>Tải về</button>
                </div>
                <pre id="preview" class="preview-output empty">Chưa có dữ liệu</pre>
            </section>
        </section>
    </main>
</body>
</html>
